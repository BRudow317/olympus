[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "olympus"
version = "0.1.0"
description = "olympus"
requires-python = ">=3.11"
dependencies = [
  "cryptography>=46.0.5",
  "oracledb>=3.4.2",
]

[tool.setuptools]
packages = ["apollo"]

[tool.pytest.ini_options]
pythonpath = [".."]
testpaths = ["tests"]
